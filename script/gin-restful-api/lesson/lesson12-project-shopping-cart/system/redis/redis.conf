# Giới hạn bộ nhớ trên RAM
maxmemory 256mb

# Least recently used: Khi bộ nhớ đạt tới 256MB, Redis sẽ xoá key nào có TTL ít dùng nhất
maxmemory-policy volatile-lru

# Bật persistence (RDB) để lưu dữ liệu
# Lưu sau 900s nếu chỉ có 1 thay đổi
save 900 1

# Lưu sau 300s nếu có 10 thay đổi
save 300 10

# Lưu sau 60s nếu có 10000 thay đổi
save 60 10000

# Thư mục lưu file dump.rdb
dir /data
